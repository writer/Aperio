name: Leak Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  leak-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run leak:check
