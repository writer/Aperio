name: Droid Auto Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  droid-review-preflight:
    name: Droid Review Preflight
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      pull-requests: write
      issues: write
    outputs:
      run_droid_review: ${{ steps.preflight.outputs.run_droid_review }}
      review_model: ${{ steps.preflight.outputs.review_model }}
      review_reason: ${{ steps.preflight.outputs.review_reason }}
      risk_categories: ${{ steps.preflight.outputs.risk_categories }}
    steps:
      - name: Supersede previous Droid comments
        if: github.event.action == 'synchronize'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import urllib.request

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          pr_number = os.environ["PR_NUMBER"]

          replacements = [
              ("## Security Review Summary", "## Superseded Security Review Summary"),
              ("**Droid encountered an error**", "**Superseded Droid error**"),
              ("Droid is reviewing code and running a security check", "Superseded Droid review in progress"),
          ]

          def request_json(method, path, payload=None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              request = urllib.request.Request(
                  f"https://api.github.com/{path.lstrip('/')}",
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "Content-Type": "application/json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  return json.load(response)

          page = 1
          while True:
              comments = request_json(
                  "GET",
                  f"/repos/{repository}/issues/{pr_number}/comments?per_page=100&page={page}",
              )
              if not comments:
                  break
              for comment in comments:
                  user = comment.get("user") or {}
                  login = (user.get("login") or "").lower()
                  if login not in {"factory-droid", "factory-droid[bot]"}:
                      continue
                  body = comment.get("body") or ""
                  updated = body
                  for marker, replacement in replacements:
                      if marker in updated:
                          updated = updated.replace(marker, replacement, 1)
                  if updated != body and "Superseded by a newer commit." not in updated:
                      updated = updated.rstrip() + "\n\n_Superseded by a newer commit._"
                  if updated != body:
                      request_json(
                          "PATCH",
                          f"/repos/{repository}/issues/comments/{comment['id']}",
                          {"body": updated},
                      )
              page += 1
          PY

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Run fast Droid review preflight
        id: preflight
        shell: bash
        env:
          DROID_REVIEW_BASE: ${{ github.event.pull_request.base.sha }}
          DROID_REVIEW_HEAD: ${{ github.event.pull_request.head.sha }}
          DROID_PREFLIGHT_JSON_OUT: tmp/droid-preflight.json
          DROID_PREFLIGHT_OUT: tmp/droid-preflight.md
        run: |
          set -euo pipefail
          node scripts/droid-review-preflight.mjs \
            --base "${DROID_REVIEW_BASE}" \
            --head "${DROID_REVIEW_HEAD}" \
            --json-out "${DROID_PREFLIGHT_JSON_OUT}" \
            --markdown-out "${DROID_PREFLIGHT_OUT}"

      - name: Install Semgrep
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user 'semgrep==1.136.0'
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Run Droid SAST context
        id: sast
        if: always() && steps.preflight.outcome != 'skipped'
        continue-on-error: true
        shell: bash
        env:
          DROID_REVIEW_BASE: ${{ github.event.pull_request.base.sha }}
          DROID_REVIEW_HEAD: ${{ github.event.pull_request.head.sha }}
          DROID_PREFLIGHT_JSON_OUT: tmp/droid-preflight.json
          DROID_SAST_OUT: tmp/droid-sast-context.md
          DROID_SAST_JSON_OUT: tmp/droid-sast-context.json
        run: |
          set -euo pipefail
          node scripts/droid-sast-context.mjs \
            --base "${DROID_REVIEW_BASE}" \
            --head "${DROID_REVIEW_HEAD}" \
            --preflight-json "${DROID_PREFLIGHT_JSON_OUT}" \
            --json-out "${DROID_SAST_JSON_OUT}" \
            --markdown-out "${DROID_SAST_OUT}"

      - name: Run Droid CI context
        id: ci-context
        if: always() && steps.preflight.outcome != 'skipped'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DROID_REVIEW_HEAD: ${{ github.event.pull_request.head.sha }}
          DROID_CI_OUT: tmp/droid-ci-context.md
          DROID_CI_JSON_OUT: tmp/droid-ci-context.json
        run: |
          set -euo pipefail
          node scripts/droid-ci-context.mjs \
            --head "${DROID_REVIEW_HEAD}" \
            --json-out "${DROID_CI_JSON_OUT}" \
            --markdown-out "${DROID_CI_OUT}"

      - name: Publish consolidated Droid context
        if: always() && steps.preflight.outcome != 'skipped'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DROID_PREFLIGHT_JSON_OUT: tmp/droid-preflight.json
          DROID_SAST_JSON_OUT: tmp/droid-sast-context.json
          DROID_CI_JSON_OUT: tmp/droid-ci-context.json
          DROID_CONTEXT_OUT: tmp/droid-review-context.md
          DROID_CONTEXT_JSON_OUT: tmp/droid-review-context.json
          DROID_CONTEXT_POST_COMMENT: "true"
        run: |
          set -euo pipefail
          node scripts/droid-review-context.mjs \
            --preflight-json "${DROID_PREFLIGHT_JSON_OUT}" \
            --sast-json "${DROID_SAST_JSON_OUT}" \
            --ci-json "${DROID_CI_JSON_OUT}" \
            --markdown-out "${DROID_CONTEXT_OUT}" \
            --json-out "${DROID_CONTEXT_JSON_OUT}" \
            --post-comment

      - name: Upload Droid context artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: droid-review-context
          path: |
            tmp/droid-preflight.json
            tmp/droid-preflight.md
            tmp/droid-sast-context.json
            tmp/droid-sast-context.md
            tmp/droid-ci-context.json
            tmp/droid-ci-context.md
            tmp/droid-review-context.json
            tmp/droid-review-context.md

  droid-review:
    name: Droid Review
    needs: droid-review-preflight
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' && needs.droid-review-preflight.outputs.run_droid_review == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Run Droid Auto Review
        uses: Factory-AI/droid-action@150e8c231191631016a9563bf5d8388e36382de9 # main
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          automatic_review: true
          automatic_security_review: true
          review_model: ${{ needs.droid-review-preflight.outputs.review_model || 'claude-opus-4-8' }}
          security_model: gpt-5.4
          allowed_bots: dependabot

  droid-review-required:
    name: Droid Review Required
    needs: [droid-review-preflight, droid-review]
    if: always() && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Enforce Droid review policy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          preflight_result="${{ needs.droid-review-preflight.result }}"
          review_result="${{ needs.droid-review.result }}"
          actor="${{ github.actor }}"

          if [ "${preflight_result}" != "success" ]; then
            echo "::error::Droid review preflight did not pass: ${preflight_result}"
            exit 1
          fi

          review_required="$(python3 <<'PY'
          import json
          import os
          import re
          import urllib.request

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          pr_number = os.environ["PR_NUMBER"]

          def request_json(path):
              request = urllib.request.Request(
                  f"https://api.github.com/{path.lstrip('/')}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  return json.load(response)

          files = []
          page = 1
          while True:
              batch = request_json(f"/repos/{repository}/pulls/{pr_number}/files?per_page=100&page={page}")
              if not batch:
                  break
              files.extend(item.get("filename", "") for item in batch)
              if len(batch) < 100:
                  break
              page += 1

          def docs_only_file(filename):
              return (
                  bool(re.search(r"\.(md|mdx|txt)$", filename, re.IGNORECASE))
                  or filename == "LICENSE"
                  or filename.startswith("droid-wiki/")
                  or filename.startswith("docs/")
              )

          print("true" if files and not all(docs_only_file(filename) for filename in files) else "false")
          PY
          )"

          if [ "${review_required}" != "true" ]; then
            echo "Droid review not required for this change."
            exit 0
          fi

          if [ "${actor}" = "dependabot[bot]" ]; then
            echo "Skipping secret-dependent Droid execution for Dependabot."
            exit 0
          fi

          if [ "${review_result}" != "success" ]; then
            echo "::error::Droid review did not pass: ${review_result}"
            exit 1
          fi

          echo "Droid review policy satisfied."
