name: Go Security

on:
  pull_request:
    paths:
      - "cmd/**"
      - "gen/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/go-security.yml"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - run: go mod download

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...
