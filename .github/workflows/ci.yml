name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-shard:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: typecheck
            command: npm run typecheck
          - name: api-tests
            command: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma && npm run test:api
          - name: migration-guardrails
            command: npm run guardrails:migration
          - name: prisma
            command: npm run db:validate
          - name: web-build
            command: npm run build:web
          - name: prod-audit
            command: npm run audit:prod
          - name: leak-check
            command: npm run leak:check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aperio
          POSTGRES_PASSWORD: aperio
          POSTGRES_DB: aperio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aperio -d aperio"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://aperio:aperio@localhost:5432/aperio?schema=public
      APERIO_ENCRYPTION_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APERIO_AUTH_SECRET: ci-auth-secret-at-least-thirty-two-chars
      APERIO_WEB_ORIGIN: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run db:generate

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}

  verify:
    runs-on: ubuntu-latest
    needs: [verify-shard, go-connect, e2e-smoke]
    if: always()
    steps:
      - name: Check verify shards
        run: |
          if [ "${{ needs.verify-shard.result }}" != "success" ]; then
            echo "One or more verify shards failed"
            exit 1
          fi
          if [ "${{ needs.go-connect.result }}" != "success" ]; then
            echo "Go/ConnectRPC checks failed"
            exit 1
          fi
          if [ "${{ needs.e2e-smoke.result }}" != "success" ]; then
            echo "E2E smoke failed"
            exit 1
          fi
          echo "All verify shards passed"

  go-connect:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aperio
          POSTGRES_PASSWORD: aperio
          POSTGRES_DB: aperio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aperio -d aperio"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://aperio:aperio@127.0.0.1:5432/aperio?schema=public
      APERIO_TEST_DATABASE_URL: postgresql://aperio:aperio@127.0.0.1:5432/aperio?sslmode=disable
      APERIO_ENCRYPTION_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APERIO_AUTH_SECRET: ci-auth-secret-at-least-thirty-two-chars
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run db:generate

      - run: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma

      - run: go mod download

      - run: go run github.com/bufbuild/buf/cmd/buf@v1.59.0 lint

      - run: make lint

      - name: Verify generated code is current
        run: |
          go run github.com/bufbuild/buf/cmd/buf@v1.59.0 generate
          git diff --exit-code -- gen packages/connect/src/gen
          test -z "$(git status --porcelain -- gen packages/connect/src/gen)"

      - run: go test ./...

      - name: Run bounded Go worker smokes
        run: npm run smoke:workers:go

  e2e-smoke:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://aperio:aperio@127.0.0.1:5433/aperio?schema=public
      APERIO_NATS_URL: nats://127.0.0.1:4222
      APERIO_ENCRYPTION_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APERIO_AUTH_SECRET: ci-auth-secret-at-least-thirty-two-chars
      APERIO_WEB_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_CONNECT_API_BASE_URL: http://localhost:4100
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: go mod download

      - run: npm run db:generate

      - name: Write local smoke env file
        run: |
          cat > .env <<EOF
          DATABASE_URL="${DATABASE_URL}"
          APERIO_NATS_URL="${APERIO_NATS_URL}"
          APERIO_ENCRYPTION_KEY="${APERIO_ENCRYPTION_KEY}"
          APERIO_AUTH_SECRET="${APERIO_AUTH_SECRET}"
          APERIO_WEB_ORIGIN="${APERIO_WEB_ORIGIN}"
          NEXT_PUBLIC_CONNECT_API_BASE_URL="${NEXT_PUBLIC_CONNECT_API_BASE_URL}"
          NEXT_TELEMETRY_DISABLED="${NEXT_TELEMETRY_DISABLED}"
          EOF

      - name: Run Go API and web E2E smoke
        run: npm run smoke:e2e
