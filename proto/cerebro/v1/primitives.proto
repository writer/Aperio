syntax = "proto3";

package cerebro.v1;

option go_package = "github.com/writer/aperio/gen/cerebro/v1;cerebrov1";

import "google/protobuf/timestamp.proto";

message EventEnvelope {
  string id = 1;
  string tenant_id = 2;
  string source_id = 3;
  string kind = 4;
  google.protobuf.Timestamp occurred_at = 5;
  string schema_ref = 6;
  bytes payload = 7;
  map<string, string> attributes = 8;
}

message EntityRef {
  string urn = 1;
  string entity_type = 2;
  string label = 3;
}

message Claim {
  string id = 1;
  string subject_urn = 2;
  EntityRef subject_ref = 3;
  string predicate = 4;
  string object_urn = 5;
  EntityRef object_ref = 6;
  string object_value = 7;
  string claim_type = 8;
  string status = 9;
  string source_event_id = 10;
  google.protobuf.Timestamp observed_at = 11;
  google.protobuf.Timestamp valid_from = 12;
  google.protobuf.Timestamp valid_to = 13;
  map<string, string> attributes = 14;
}
