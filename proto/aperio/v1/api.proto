  string type = 4;
  string provider = 5;
  string name = 6;
  string summary = 7;
  string external_id = 8;
  repeated string labels = 9;
  string criticality = 10;
  string exposure_level = 11;
  string ownership_status = 12;
  bool contains_sensitive_data = 13;
