  string email = 2;
  string display_name = 3;
  bool is_active = 4;
  bool mfa_enabled = 5;
  string last_login_at = 6;
  bool is_break_glass = 7;
  string role = 8;
  string auth_state = 9;
  string pending_action_expires_at = 10;
  string created_at = 11;
}

message InvitationResult {
  string delivery = 1;
  string url = 2;
  string expires_at = 3;
}

message ListAuditLogsRequest {}

message ListAuditLogsResponse {
  repeated AuditLogEntry data = 1;
}

message AuditLogEntry {
  string id = 1;
  string action = 2;
  string target_type = 3;
  string target_id = 4;
  string actor = 5;
  string created_at = 6;
  string metadata_json = 7;
}

message GetSecurityOverviewRequest {}

message GetSecurityOverviewResponse {
  SecurityOverview data = 1;
}

message SecurityOverview {
  SecurityOverviewSummary summary = 1;
  repeated SecurityIdentity identities = 2;
  SecurityGraph graph = 3;
  repeated SecurityAsset oauth_apps = 4;
  repeated SecurityAsset data_assets = 5;
  repeated AttackPath attack_paths = 6;
  repeated SecurityAsset ownership_gaps = 7;
  repeated RiskException exceptions = 8;
  repeated DomainWideDelegation domain_wide_delegations = 9;
}

message SecurityOverviewSummary {
  int32 privileged_identities = 1;
  int32 admin_identities_without_mfa = 2;
  int32 risky_oauth_apps = 3;
  int32 exposed_data_assets = 4;
  int32 unowned_assets = 5;
  int32 active_exceptions = 6;
  int32 top_blast_radius_score = 7;
}

message SecurityIdentity {
  string id = 1;
  string entity_id = 2;
  string kind = 3;
  string name = 4;
  string email = 5;
  string provider = 6;
  FindingIntegration integration = 7;
  string role = 8;
  bool privileged = 9;
  bool mfa_enabled = 10;
  string status = 11;
  bool is_external = 12;
  string last_observed_at = 13;
  int32 linked_asset_count = 14;
  int32 risk_score = 15;
  optional bool mfa_enabled_state = 16;
}

message SecurityGraph {
  repeated SecurityGraphNode nodes = 1;
  repeated SecurityGraphEdge edges = 2;
}

message SecurityGraphNode {
  string id = 1;
  string label = 2;
  string kind = 3;
  int32 risk_score = 4;
  bool privileged = 5;
  string exposure_level = 6;
  string criticality = 7;
}

message SecurityGraphEdge {
  string id = 1;
  string source_id = 2;
  string target_id = 3;
  string relationship_type = 4;
}

message AttackPath {
  string id = 1;
  string title = 2;
  int32 score = 3;
  string finding_title = 4;
  string entry_point = 5;
  string target = 6;
  string owner = 7;
  string exposure_level = 8;
  string criticality = 9;
  string reason = 10;
  repeated string path = 11;
}

message DomainWideDelegation {
  string integration_id = 1;
  string provider = 2;
  string display_name = 3;
  string workspace_domain = 4;
  string service_account_client_email = 5;
  repeated string scopes = 6;
  string status = 7;
  string integration_status = 8;
  string mode = 9;
  int32 open_mailbox_findings = 10;
  string last_sync_at = 11;
  string configured_at = 12;
}

