syntax = "proto3";

package aperio.v1;

option go_package = "github.com/writer/aperio/gen/aperio/v1;aperiov1";

import "google/protobuf/timestamp.proto";

service AperioService {
  rpc CallApi(CallApiRequest) returns (CallApiResponse);
  rpc CheckHealth(CheckHealthRequest) returns (CheckHealthResponse);
  rpc GetDashboardMetrics(GetDashboardMetricsRequest) returns (GetDashboardMetricsResponse);
  rpc ListFindings(ListFindingsRequest) returns (ListFindingsResponse);
  rpc GetFinding(GetFindingRequest) returns (GetFindingResponse);
  rpc UpdateFindingStatus(UpdateFindingStatusRequest) returns (UpdateFindingStatusResponse);
  rpc RemediateFinding(RemediateFindingRequest) returns (RemediateFindingResponse);
  rpc ListConnectorCatalog(ListConnectorCatalogRequest) returns (ListConnectorCatalogResponse);
  rpc ListIntegrations(ListIntegrationsRequest) returns (ListIntegrationsResponse);
  rpc CreateIntegration(CreateIntegrationRequest) returns (CreateIntegrationResponse);
  rpc DeleteIntegration(DeleteIntegrationRequest) returns (DeleteIntegrationResponse);
  rpc GetIntegrationChecks(GetIntegrationChecksRequest) returns (GetIntegrationChecksResponse);
  rpc UpdateIntegrationChecks(UpdateIntegrationChecksRequest) returns (UpdateIntegrationChecksResponse);
  rpc GetGoogleMailboxScanConfig(GetGoogleMailboxScanConfigRequest) returns (GetGoogleMailboxScanConfigResponse);
  rpc UpdateGoogleMailboxScanConfig(UpdateGoogleMailboxScanConfigRequest) returns (UpdateGoogleMailboxScanConfigResponse);
  rpc StartGoogleWorkspaceOAuth(StartGoogleWorkspaceOAuthRequest) returns (StartGoogleWorkspaceOAuthResponse);
  rpc ForceSyncIntegration(ForceSyncIntegrationRequest) returns (ForceSyncIntegrationResponse);
  rpc ListSiemCatalog(ListSiemCatalogRequest) returns (ListSiemCatalogResponse);
  rpc ListSiemDestinations(ListSiemDestinationsRequest) returns (ListSiemDestinationsResponse);
  rpc CreateSiemDestination(CreateSiemDestinationRequest) returns (CreateSiemDestinationResponse);
  rpc DeleteSiemDestination(DeleteSiemDestinationRequest) returns (DeleteSiemDestinationResponse);
  rpc TestSiemDestination(TestSiemDestinationRequest) returns (TestSiemDestinationResponse);
  rpc ListShadowItOauthApps(ListShadowItOauthAppsRequest) returns (ListShadowItOauthAppsResponse);
  rpc ListShadowItOauthAppGrants(ListShadowItOauthAppGrantsRequest) returns (ListShadowItOauthAppGrantsResponse);
  rpc ListSecurityAssets(ListSecurityAssetsRequest) returns (ListSecurityAssetsResponse);
  rpc ListRiskExceptions(ListRiskExceptionsRequest) returns (ListRiskExceptionsResponse);
}

message CallApiRequest {
  string method = 1;
  string path = 2;
  string body_json = 3;
}

message CallApiResponse {
  string body_json = 1;
}

message CheckHealthRequest {}

message CheckHealthResponse {
  string status = 1;
  string service = 2;
  google.protobuf.Timestamp checked_at = 3;
  repeated HealthComponent components = 4;
}

message HealthComponent {
  string name = 1;
  string status = 2;
  string detail = 3;
}

message GetDashboardMetricsRequest {}

message GetDashboardMetricsResponse {
  DashboardMetrics data = 1;
}

message DashboardMetrics {
  int32 total_risk_score = 1;
  int32 open_critical_findings = 2;
  int32 connected_apps = 3;
  int32 event_ingestion_rate = 4;
}

message ListFindingsRequest {
  string severity = 1;
  string status = 2;
  string provider = 3;
  string integration_id = 4;
  int32 limit = 5;
  string cursor = 6;
}

message ListFindingsResponse {
  repeated Finding data = 1;
  PageInfo page_info = 2;
}

message GetFindingRequest {
  string id = 1;
}

message GetFindingResponse {
  Finding data = 1;
}

message UpdateFindingStatusRequest {
  string id = 1;
  string status = 2;
  string resolution_note = 3;
}

message UpdateFindingStatusResponse {
  FindingStatusUpdate data = 1;
}

message FindingStatusUpdate {
  string id = 1;
  string status = 2;
}

message RemediateFindingRequest {
  string finding_id = 1;
  string action = 2;
  string target_identifier = 3;
  string note = 4;
}

message RemediateFindingResponse {
  RemediationResult data = 1;
}

message RemediationResult {
  string finding_id = 1;
  string action = 2;
  bool success = 3;
  string message = 4;
  string provider_request_id = 5;
  repeated string effects = 6;
}

message Finding {
  string id = 1;
  string asset_id = 2;
  string title = 3;
  string description = 4;
  string severity = 5;
  string status = 6;
  int32 risk_score = 7;
  repeated string remediation_steps = 8;
  string evidence_json = 9;
  string detected_at = 10;
  string resolved_at = 11;
  FindingIntegration integration = 12;
}

message FindingIntegration {
  string id = 1;
  string provider = 2;
  string display_name = 3;
}

message PageInfo {
  int32 total = 1;
  string next_cursor = 2;
}

message ListConnectorCatalogRequest {}

message ListConnectorCatalogResponse {
  repeated ConnectorDefinition data = 1;
}

message ConnectorDefinition {
  string provider = 1;
  string name = 2;
  string category = 3;
  string availability = 4;
  string readiness_note = 5;
  string description = 6;
  repeated string read_scopes = 7;
  repeated string remediation_scopes = 8;
  repeated RemediationAction remediation_actions = 9;
  repeated FindingCheck finding_checks = 10;
  string docs_url = 11;
  repeated ConnectorField fields = 12;
}

message ConnectorField {
  string key = 1;
  string label = 2;
  string placeholder = 3;
  string helper = 4;
  string type = 5;
  bool required = 6;
  bool secret = 7;
}

message RemediationAction {
  string key = 1;
  string label = 2;
  string description = 3;
  string severity_hint = 4;
}

message FindingCheck {
  string key = 1;
  string title = 2;
  string description = 3;
  string severity_hint = 4;
  bool default_enabled = 5;
}

message ListIntegrationsRequest {}

message ListIntegrationsResponse {
  repeated IntegrationConnection data = 1;
}

message IntegrationConnection {
  string id = 1;
  string provider = 2;
  string display_name = 3;
  string external_account_id = 4;
  string status = 5;
  string mode = 6;
  repeated string scopes = 7;
  repeated string disabled_checks = 8;
  bool google_mailbox_scan_enabled = 9;
  string google_mailbox_scan_client_email = 10;
  string last_sync_at = 11;
  string created_at = 12;
}

message CreateIntegrationRequest {
  string provider = 1;
  string display_name = 2;
  string external_account_id = 3;
  string mode = 4;
  IntegrationCredentials credentials = 5;
}

message IntegrationCredentials {
  string access_token = 1;
  string refresh_token = 2;
  string webhook_secret = 3;
}

message CreateIntegrationResponse {
  IntegrationConnection data = 1;
}

message DeleteIntegrationRequest {
  string id = 1;
}

message DeleteIntegrationResponse {
  DeleteResult data = 1;
}

message DeleteResult {
  bool ok = 1;
}

message GetIntegrationChecksRequest {
  string integration_id = 1;
}

message GetIntegrationChecksResponse {
  IntegrationCheckState data = 1;
}

message UpdateIntegrationChecksRequest {
  string integration_id = 1;
  repeated string disabled_checks = 2;
}

message UpdateIntegrationChecksResponse {
  IntegrationCheckState data = 1;
}

message IntegrationCheckState {
  string integration_id = 1;
  repeated string disabled_checks = 2;
  repeated FindingCheckStatus checks = 3;
}

message FindingCheckStatus {
  string key = 1;
  string title = 2;
  string description = 3;
  string severity_hint = 4;
  bool default_enabled = 5;
  bool enabled = 6;
}

message GetGoogleMailboxScanConfigRequest {
  string integration_id = 1;
}

message GetGoogleMailboxScanConfigResponse {
  GoogleMailboxScanConfig data = 1;
}

message UpdateGoogleMailboxScanConfigRequest {
  string integration_id = 1;
  bool enabled = 2;
  string service_account_client_email = 3;
  string private_key = 4;
}

message UpdateGoogleMailboxScanConfigResponse {
  GoogleMailboxScanConfig data = 1;
}

message GoogleMailboxScanConfig {
  bool enabled = 1;
  string service_account_client_email = 2;
}

message StartGoogleWorkspaceOAuthRequest {
  string mode = 1;
}

message StartGoogleWorkspaceOAuthResponse {
  OAuthStart data = 1;
}

message OAuthStart {
  string url = 1;
}

message ForceSyncIntegrationRequest {
  string integration_id = 1;
}

message ForceSyncIntegrationResponse {
  IntegrationConnection data = 1;
  SyncSummary sync = 2;
}

message SyncSummary {
  int32 sample_count = 1;
  int32 events_ingested = 2;
  int32 findings_opened = 3;
  repeated string sources = 4;
}

message ListSiemCatalogRequest {}

message ListSiemCatalogResponse {
  repeated SiemDestinationDefinition data = 1;
}

message SiemDestinationDefinition {
  string kind = 1;
  string name = 2;
  string vendor = 3;
  string description = 4;
  string category = 5;
  string docs_url = 6;
  repeated string default_streams = 7;
  repeated SiemField fields = 8;
}

message SiemField {
  string key = 1;
  string label = 2;
  string placeholder = 3;
  string helper = 4;
  string type = 5;
  bool required = 6;
  bool secret = 7;
}

message ListSiemDestinationsRequest {}

message ListSiemDestinationsResponse {
  repeated SiemDestination data = 1;
}

message SiemDestination {
  string id = 1;
  string kind = 2;
  string name = 3;
  string endpoint_url = 4;
  string file_path = 5;
  string index = 6;
  repeated string streams = 7;
  string status = 8;
  string last_delivery_at = 9;
  string last_error = 10;
  int32 deliveries_ok = 11;
  int32 deliveries_fail = 12;
  string created_at = 13;
}

message CreateSiemDestinationRequest {
  string kind = 1;
  string name = 2;
  string endpoint_url = 3;
  string file_path = 4;
  string index = 5;
  string token = 6;
  repeated string streams = 7;
}

message CreateSiemDestinationResponse {
  SiemDestination data = 1;
}

message DeleteSiemDestinationRequest {
  string id = 1;
}

message DeleteSiemDestinationResponse {
  DeleteResult data = 1;
}

message TestSiemDestinationRequest {
  string id = 1;
}

message TestSiemDestinationResponse {
  SiemTestResult data = 1;
}

message SiemTestResult {
  string destination_id = 1;
  bool ok = 2;
  string message = 3;
}

message ListShadowItOauthAppsRequest {}

message ListShadowItOauthAppsResponse {
  repeated ShadowItOauthApp data = 1;
}

message ShadowItOauthApp {
  string id = 1;
  string provider = 2;
  string name = 3;
  string summary = 4;
  string external_id = 5;
  repeated string labels = 6;
  string criticality = 7;
  bool contains_sensitive_data = 8;
  int32 risk_score = 9;
  string last_observed_at = 10;
  int32 user_count = 11;
  repeated string scopes = 12;
  FindingIntegration integration = 13;
}

message ListShadowItOauthAppGrantsRequest {
  string asset_id = 1;
}

message ListShadowItOauthAppGrantsResponse {
  ShadowItOauthAppDetail data = 1;
}

message ShadowItOauthAppDetail {
  ShadowItOauthAppRef app = 1;
  repeated ShadowItOauthAppGrant grants = 2;
}

message ShadowItOauthAppRef {
  string id = 1;
  string name = 2;
  string external_id = 3;
  string provider = 4;
}

message ShadowItOauthAppGrant {
  string id = 1;
  string user_email = 2;
  string user_external_id = 3;
  string user_display_name = 4;
  repeated string scopes = 5;
  bool anonymous = 6;
  bool native_app = 7;
  string last_observed_at = 8;
}

message ListSecurityAssetsRequest {
  string type = 1;
  string ownership_status = 2;
  string integration_id = 3;
}

message ListSecurityAssetsResponse {
  repeated SecurityAsset data = 1;
}

message SecurityAsset {
  string id = 1;
  string type = 2;
  string provider = 3;
  string name = 4;
  string summary = 5;
  string external_id = 6;
  repeated string labels = 7;
  string criticality = 8;
  string exposure_level = 9;
  string ownership_status = 10;
  bool contains_sensitive_data = 11;
  bool is_privileged = 12;
  int32 risk_score = 13;
  string last_observed_at = 14;
  string created_at = 15;
  string updated_at = 16;
  FindingIntegration integration = 17;
  SecurityPrincipal owner = 18;
  SecurityPrincipal business_owner = 19;
  int32 open_finding_count = 20;
  int32 active_exception_count = 21;
}

message SecurityPrincipal {
  string id = 1;
  string email = 2;
  string display_name = 3;
}

message ListRiskExceptionsRequest {}

message ListRiskExceptionsResponse {
  repeated RiskException data = 1;
}

message RiskException {
  string id = 1;
  string title = 2;
  string rationale = 3;
  repeated string compensating_controls = 4;
  string status = 5;
  string expires_at = 6;
  string approved_at = 7;
  string created_at = 8;
  string updated_at = 9;
  RiskExceptionAsset asset = 10;
  RiskExceptionFinding finding = 11;
  SecurityPrincipal created_by = 12;
  SecurityPrincipal approved_by = 13;
}

message RiskExceptionAsset {
  string id = 1;
  string name = 2;
  string type = 3;
}

message RiskExceptionFinding {
  string id = 1;
  string title = 2;
  string severity = 3;
  string status = 4;
}
