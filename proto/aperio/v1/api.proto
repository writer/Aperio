}

message UpdateTenantSettingsResponse {
  TenantSettings data = 1;
}

message TenantSettings {
  string id = 1;
  string name = 2;
  string slug = 3;
  string notification_email = 4;
  int32 data_retention_days = 5;
  int32 critical_risk_threshold = 6;
  int32 default_sla_hours = 7;
  bool auto_resolve_low_severity = 8;
  bool enforce_sso_only = 9;
  string webhook_alert_url = 10;
  string created_at = 11;
  string updated_at = 12;
}

message ListTenantMembersRequest {}

message ListTenantMembersResponse {
  repeated TenantMember data = 1;
}

message CreateTenantMemberRequest {
  string email = 1;
  string display_name = 2;
  string role_name = 3;
}

message CreateTenantMemberResponse {
