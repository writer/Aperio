  bool has_html = 9;
  bool has_pdf = 10;
  string html_url = 11;
  string pdf_url = 12;
  string created_at = 13;
  string updated_at = 14;
  string generated_at = 15;
  string error_message = 16;
  string requested_by_user_id = 17;
