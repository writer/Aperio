services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aperio
      POSTGRES_PASSWORD: aperio
      POSTGRES_DB: aperio
    ports:
      - "5432:5432"
    volumes:
      - aperio-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aperio -d aperio"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  aperio-postgres:
