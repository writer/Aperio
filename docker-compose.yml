services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aperio
      POSTGRES_PASSWORD: aperio
      POSTGRES_DB: aperio
    ports:
      - "5432:5432"
    volumes:
      - aperio-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aperio -d aperio"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - aperio-nats:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  aperio-postgres:
  aperio-nats:
