version: v2
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: gen
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go:v1.19.2
    out: gen
    opt:
      - paths=source_relative
      - package_suffix=connect
  - remote: buf.build/bufbuild/es:v2.10.0
    out: packages/connect/src/gen
    opt:
      - target=ts
